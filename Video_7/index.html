<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="FormsAndInputTags including labels, textarea and select.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormsAndInputTags</title>
  </head>
  <body>
    <h1>Form to apply for the course</h1>
    <form action="">
      <div>
        <label for="username">Username please!</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
        />
      </div>
      <div>
        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" />
        <label for="female">Female</label>
      </div>
      <div>
        <input type="checkbox" id="subscribe" name="subscribe" />
        <label for="subscribe">Subscribe to us!</label>
      </div>
      <div>
        <label for="comment">Enter your comment</label>
        <br>
        <textarea name="comment" id="comment" rows="4" cols="50">
            Enter your comment here...
        </textarea>
      </div>
      <div>
        <select name="fruits" id="">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
        </select>
      </div>
    </form>
  </body>
</html>
