<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ways to add CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #internal{
            color: red;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Three ways to add CSS.</h1>
    <h2>Inline CSS</h2>
    <span style="color: red; background-color: yellow;">Example of inline CSS.</span>
    <h2>Internal CSS</h2>
    <span id="internal">Example of internal CSS.</span>
    <h2>External CSS</h2>
    <span id="external">Example of external CSS.</span>
</body>
</html>
